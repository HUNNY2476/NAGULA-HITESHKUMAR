<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#0b5ed7;
    color:white;
}

h1{
    margin-top:20px;
}

#board{
    width:300px;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:5px;
}

.cell{
    width:100px;
    height:100px;
    background:white;
    color:#0b5ed7;
    font-size:40px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.cell:hover{
    background:#e6f0ff;
}

/* RESTART BUTTON */

.restartBtn{
    padding:12px 25px;
    font-size:16px;
    background:white;
    color:#0b5ed7;
    border:none;
    border-radius:8px;
    margin-top:20px;
    cursor:pointer;
    font-weight:bold;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.restartBtn:hover{
    background:#e6f0ff;
}

/* POPUP BUTTON */

.popupBtn{
    padding:14px 28px;
    font-size:18px;
    background:#0b5ed7;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.popupBtn:hover{
    background:#084298;
}

/* POPUP */

#popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
}

#popupContent{
    background:white;
    padding:30px;
    border-radius:12px;
    text-align:center;
    color:#0b5ed7;
}

</style>

</head>

<body>

<h1>Tic Tac Toe</h1>

<h2 id="status">Player X Turn</h2>

<div id="board">

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

</div>

<button class="restartBtn" onclick="restartGame()">Restart Game</button>

<!-- POPUP -->

<div id="popup">
<div id="popupContent">

<h2 id="popupText"></h2>

<button class="popupBtn" onclick="restartGame()">Play Again</button>

</div>
</div>

<script>

let board = ["","","","","","","","",""];
let currentPlayer = "X";
let gameActive = true;

const cells = document.querySelectorAll(".cell");
const statusText = document.getElementById("status");

const winningCombos = [
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

cells.forEach((cell,index)=>{
    cell.addEventListener("click",()=>makeMove(index));
});

function makeMove(index){

if(board[index]!=="" || !gameActive) return;

board[index]=currentPlayer;
cells[index].textContent=currentPlayer;

if(checkWinner()){
gameActive=false;
showPopup("Player "+currentPlayer+" Wins!");
return;
}

if(!board.includes("")){
gameActive=false;
showPopup("Game Draw!");
return;
}

currentPlayer=currentPlayer==="X"?"O":"X";
statusText.textContent="Player "+currentPlayer+" Turn";

}

function checkWinner(){

for(let combo of winningCombos){

let [a,b,c]=combo;

if(board[a] && board[a]===board[b] && board[a]===board[c]){
return true;
}

}

return false;

}

function showPopup(message){

document.getElementById("popupText").innerText=message;
document.getElementById("popup").style.display="flex";

}

function restartGame(){

board=["","","","","","","","",""];
currentPlayer="X";
gameActive=true;

cells.forEach(cell=>cell.textContent="");

document.getElementById("popup").style.display="none";

statusText.textContent="Player X Turn";

}

</script>

</body>
</html>
